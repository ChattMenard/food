# GitLab CI/CD Pipeline
# Strict gates: lint + unit + build verification + E2E smoke
# Non-blocking reports: format drift + dependency audit

stages:
  - validate
  - e2e
  - report

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

default:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/

validate:
  stage: validate
  image: node:20
  script:
    - npm ci
    - npm run lint
    - npm run test:ci
    - npm run build:css:once

e2e-smoke:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.50.0-jammy
  script:
    - npm ci
    - npm run test:e2e:ci
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

format-report:
  stage: report
  image: node:20
  script:
    - npm ci
    - npm run format:check

dependency-audit:
  stage: report
  image: node:20
  script:
    - npm ci
    - npm audit --omit=dev
