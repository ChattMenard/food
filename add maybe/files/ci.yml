name: CI - Test & Coverage

# Trigger on every push and pull request
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel previous runs if new commit pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Unit + Integration Tests
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
      
      - name: Check coverage thresholds
        run: |
          # Extract coverage percentages from Jest output
          # Fail if below thresholds defined in TODO Phase A4:
          # Statements: 80%, Branches: 70%, Functions: 80%, Lines: 80%
          npm run test:coverage -- --coverageReporters=json-summary
          
          # This will be enforced by jest.config.js coverageThreshold
      
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
      
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  # Job 2: E2E Tests (Playwright)
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Build app for testing
        run: npm run build:test
        env:
          NODE_ENV: test
      
      - name: Start test server
        run: |
          npm run serve:test &
          npx wait-on http://localhost:8080 --timeout 30000
      
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      
      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
      
      - name: Upload E2E screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-screenshots
          path: test-results/**/*.png
          retention-days: 7

  # Job 3: Offline E2E Tests
  e2e-offline:
    name: E2E Offline Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Build app
        run: npm run build:test
      
      - name: Start test server
        run: |
          npm run serve:test &
          npx wait-on http://localhost:8080
      
      - name: Run offline E2E tests
        run: npm run test:e2e:offline
        env:
          CI: true
      
      - name: Upload offline test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-offline-results
          path: test-results/
          retention-days: 7

  # Job 4: Lint & Format Check
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true # Don't fail build yet, just report
      
      - name: Check formatting (Prettier)
        run: npm run format:check
        continue-on-error: true

  # Job 5: Build Verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production bundle
        run: npm run build:prod
        env:
          NODE_ENV: production
      
      - name: Check bundle size
        run: |
          # Analyze bundle - warn if main.js > 500KB
          BUNDLE_SIZE=$(stat -c%s "www/dist/main.js" 2>/dev/null || stat -f%z "www/dist/main.js")
          echo "Bundle size: ${BUNDLE_SIZE} bytes"
          
          if [ $BUNDLE_SIZE -gt 512000 ]; then
            echo "⚠️ Warning: Bundle size exceeds 500KB"
            exit 1
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: production-build
          path: www/dist/
          retention-days: 7

  # Job 6: Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true # Don't fail on moderate issues yet
      
      - name: Check for known vulnerabilities
        run: |
          # This would integrate with Snyk or similar
          echo "Security check placeholder - integrate Snyk/Dependabot"

# Coverage diff on PRs (optional enhancement)
# This would compare coverage between base and PR branch
